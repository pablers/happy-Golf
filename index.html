<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#22c55e" />
    <title>Golf Master - Mejora tu Tempo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script type="importmap">
{
  "imports": {
    "@nestjs/common": "https://esm.sh/@nestjs/common@^10.4.15",
    "@nestjs/config": "https://esm.sh/@nestjs/config@^4.0.2",
    "class-transformer": "https://aistudiocdn.com/class-transformer@^0.5.1"
  }
}
</script>
    <script>
      // Prevents Flash of Unstyled Content (FOUC) for dark mode
      if (localStorage.getItem('golf-theme') === 'dark' || (!('golf-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <style>
      .tempo-slider::-webkit-slider-runnable-track {
        background: transparent;
        height: 100%;
      }
      .tempo-slider::-moz-range-track {
        background: transparent;
        height: 100%;
      }
      .tempo-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        margin-top: -10px; /* Center thumb vertically */
        height: 32px;
        width: 32px;
        background-color: #f0fdf4; /* green-50 */
        border-radius: 50%;
        border: 4px solid #22c55e; /* green-500 */
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        transition: transform 0.1s ease-in-out;
      }
      .dark .tempo-slider::-webkit-slider-thumb {
          background-color: #1f2937; /* gray-800 */
      }
      .tempo-slider:active::-webkit-slider-thumb {
        transform: scale(1.1);
      }
      .tempo-slider::-moz-range-thumb {
        height: 24px;
        width: 24px;
        background-color: #f0fdf4;
        border-radius: 50%;
        border: 4px solid #22c55e;
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        transition: transform 0.1s ease-in-out;
        border: none; /* Reset border for Firefox */
      }
       .dark .tempo-slider::-moz-range-thumb {
          background-color: #1f2937;
      }
      .tempo-slider:active::-moz-range-thumb {
        transform: scale(1.1);
      }
      
      @keyframes spin-y {
        from {
            transform: rotateY(0deg);
        }
        to {
            transform: rotateY(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-gray-100 dark:bg-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
