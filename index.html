<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golf Swing Metronome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            animation: {
              'spin-y': 'spin-y 15s linear infinite',
            }
          }
        }
      }
    </script>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
    "react/": "https://esm.sh/react@^19.1.1/",
    "react": "https://esm.sh/react@^19.1.1",
    "@google/genai": "https://esm.sh/@google/genai@^1.13.0",
    "@nestjs/common": "https://esm.sh/@nestjs/common@^11.1.6",
    "@nestjs/core": "https://esm.sh/@nestjs/core@^11.1.6",
    "passport-jwt": "https://esm.sh/passport-jwt@^4.0.1",
    "class-validator": "https://esm.sh/class-validator@^0.14.2",
    "bcrypt": "https://esm.sh/bcrypt@^6.0.0",
    "@nestjs/passport": "https://esm.sh/@nestjs/passport@^11.0.5",
    "@nestjs/jwt": "https://esm.sh/@nestjs/jwt@^11.0.0",
    "@nestjs/config": "https://esm.sh/@nestjs/config@^4.0.2",
    "class-transformer": "https://aistudiocdn.com/class-transformer@^0.5.1"
  }
}
</script>
    <script>
      // Prevents Flash of Unstyled Content (FOUC) for dark mode
      if (localStorage.getItem('golf-theme') === 'dark' || (!('golf-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <style>
      .tempo-slider::-webkit-slider-runnable-track {
        background: transparent;
        height: 100%;
      }
      .tempo-slider::-moz-range-track {
        background: transparent;
        height: 100%;
      }
      .tempo-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        margin-top: -10px; /* Center thumb vertically */
        height: 32px;
        width: 32px;
        background-color: #f0fdf4; /* green-50 */
        border-radius: 50%;
        border: 4px solid #22c55e; /* green-500 */
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        transition: transform 0.1s ease-in-out;
      }
      .dark .tempo-slider::-webkit-slider-thumb {
          background-color: #1f2937; /* gray-800 */
      }
      .tempo-slider:active::-webkit-slider-thumb {
        transform: scale(1.1);
      }
      .tempo-slider::-moz-range-thumb {
        height: 24px;
        width: 24px;
        background-color: #f0fdf4;
        border-radius: 50%;
        border: 4px solid #22c55e;
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        transition: transform 0.1s ease-in-out;
        border: none; /* Reset border for Firefox */
      }
       .dark .tempo-slider::-moz-range-thumb {
          background-color: #1f2937;
      }
      .tempo-slider:active::-moz-range-thumb {
        transform: scale(1.1);
      }
      
      @keyframes spin-y {
        from {
            transform: rotateY(0deg);
        }
        to {
            transform: rotateY(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-gray-100 dark:bg-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
