services:
  - type: web
    name: happy-golf-backend
    env: node
    plan: free
    region: frankfurt
    buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
